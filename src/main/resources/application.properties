spring.application.name=backend-basic

# URL de conexión (Formato: jdbc:postgresql://host:puerto/nombre_bd)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}

# Credenciales
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASS}

# Driver Class (Opcional en versiones modernas de Spring Boot, lo detecta solo)
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true